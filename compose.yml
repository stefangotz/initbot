services:
  chat:
    build:
      context: .
      target: chat
    env_file:
      - path: .env
        required: false
      - path: .env.chat
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      NOTIFY_HOST: web
      NOTIFY_PORT: "9876"
    volumes:
      - data:/data

  web:
    build:
      context: .
      target: web
    env_file:
      - path: .env
        required: false
      - path: .env.web
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      WEB_HOST: "0.0.0.0"
      NOTIFY_PORT: "9876"
    volumes:
      - data:/data

  caddy:
    profiles: ["caddy"]
    image: caddy:alpine
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  ngrok:
    profiles: ["ngrok"]
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http web:8080 --url https://${DOMAIN}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - web
    ports:
      - "4040:4040"

volumes:
  data:
  caddy_data:
  caddy_config:
