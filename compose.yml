services:
  chat:
    profiles: ["chat"]
    build:
      context: .
      target: chat
    env_file:
      - path: .env
        required: false
      - path: .env.chat
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      NOTIFY_HOST: web
      NOTIFY_PORT: "9876"
      CHAT_NOTIFY_HOST: "0.0.0.0"
      CHAT_NOTIFY_PORT: "9877"
      LOG_LEVEL: ${LOG_LEVEL:-20}
    volumes:
      - data:/data

  web:
    profiles: ["web"]
    build:
      context: .
      target: web
    env_file:
      - path: .env
        required: false
      - path: .env.web
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      WEB_HOST: "0.0.0.0"
      NOTIFY_PORT: "9876"
      CHAT_NOTIFY_HOST: chat
      CHAT_NOTIFY_PORT: "9877"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - data:/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  # caddy profile: HTTPS via Caddy reverse proxy. Requires WEB_HOSTNAME in .env.
  caddy:
    profiles: ["caddy"]
    # Pin by digest for supply chain integrity.
    # To upgrade: docker pull caddy:X.Y.Z-alpine
    #             docker inspect --format='{{index .RepoDigests 0}}' caddy:X.Y.Z-alpine
    image: caddy:2.11.3-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ngrok profile: public HTTPS tunnel. Requires NGROK_AUTHTOKEN in .env.
  # Set WEB_HOSTNAME in .env to use a static ngrok hostname; omit for a random URL each restart.
  ngrok:
    profiles: ["ngrok"]
    image: ngrok/ngrok:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - 'if [ -n "$$WEB_HOSTNAME" ]; then exec ngrok http web:8080 --url https://$$WEB_HOSTNAME; else exec ngrok http web:8080; fi'
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      WEB_HOSTNAME: ${WEB_HOSTNAME:-}
    depends_on:
      - web
    ports:
      - "4040:4040"

volumes:
  data:
  caddy_data:
  caddy_config:
