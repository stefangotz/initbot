services:
  chat:
    profiles: ["chat"]
    build:
      context: .
      target: chat
    env_file:
      - path: .env
        required: false
      - path: .env.chat
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      NOTIFY_HOST: web
      NOTIFY_PORT: "9876"
    volumes:
      - data:/data

  web:
    profiles: ["web"]
    build:
      context: .
      target: web
    env_file:
      - path: .env
        required: false
      - path: .env.web
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      WEB_HOST: "0.0.0.0"
      NOTIFY_PORT: "9876"
    ports:
      - "8080:8080"
    volumes:
      - data:/data

  # caddy profile: HTTPS via Caddy reverse proxy. Requires WEB_HOSTNAME in .env.
  caddy:
    profiles: ["caddy"]
    image: caddy:alpine
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  # ngrok profile: public HTTPS tunnel. Requires NGROK_AUTHTOKEN in .env.
  # Set WEB_HOSTNAME in .env to use a static ngrok hostname; omit for a random URL each restart.
  ngrok:
    profiles: ["ngrok"]
    image: ngrok/ngrok:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - 'if [ -n "$$WEB_HOSTNAME" ]; then exec ngrok http web:8080 --url https://$$WEB_HOSTNAME; else exec ngrok http web:8080; fi'
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      WEB_HOSTNAME: ${WEB_HOSTNAME:-}
    depends_on:
      - web
    ports:
      - "4040:4040"

volumes:
  data:
  caddy_data:
  caddy_config:
