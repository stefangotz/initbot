services:
  chat:
    build:
      context: .
      target: chat
    env_file:
      - path: .env
        required: false
      - path: .env.chat
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
    volumes:
      - data:/data

  web:
    build:
      context: .
      target: web
    env_file:
      - path: .env
        required: false
      - path: .env.web
        required: false
    environment:
      STATE: sqlite:/data/app.sqlite
      WEB_HOST: "0.0.0.0"
    volumes:
      - data:/data

  caddy:
    image: caddy:alpine
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  data:
  caddy_data:
  caddy_config:
