[tool.uv.workspace]
members = [
    "packages/initbot-core",
    "packages/initbot-chat",
]

[dependency-groups]
dev = [
    "pre-commit>=3.5.0",
    "black>=24.8.0",
    "coverage>=7.6.1",
    "pip-audit>=2.7",
    "flake8>=7.3.0",
    "mypy>=1.11.2",
    "pylint>=3.2.7",
    "pytest>=8.3.3",
    "pytest-asyncio>=0.24",
    "types-peewee>=3.17.7.20241017",
    "zizmor>=1.23.1",
]

[tool.black]
target-version = ["py310", "py311", "py312", "py313", "py314"]

[tool.mypy]
check_untyped_defs = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "packages/initbot-core/src:packages/initbot-chat/src"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
