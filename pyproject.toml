[tool.uv.workspace]
members = [
    "packages/initbot-core",
    "packages/initbot-chat",
    "packages/initbot-web",
]

[dependency-groups]
dev = [
    "pre-commit>=3.5.0",
    "check-python-versions>=0.24.0",
    "coverage>=7.13.5",
    "ruff>=0.15.9",
    "httpx>=0.27",
    "ty>=0.0.24",
    "pylint>=3.2.7",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "types-peewee>=4.0.0.20260402",
    "zizmor>=1.23.1",
    "reuse>=6.2.0",
    "mutmut>=3.5.0",
    "cyclonedx-bom>=7.3.0",
    "detect-secrets>=1.5",
    "vulture>=2.16",
]

[tool.uv]
constraint-dependencies = [
    "aiohttp>=3.13.4",
]

[tool.ruff]
src = [
    "packages/initbot-core/src",
    "packages/initbot-chat/src",
    "packages/initbot-web/src",
]
extend-include = ["*.md"]
extension = {"md" = "markdown"}

[tool.ruff.format]
preview = true  # required for markdown code-block formatting

[tool.ruff.lint]
select = ["E", "F", "I", "S", "B", "C4", "UP", "PERF", "RUF", "SIM", "PT", "ANN"]
ignore = [
    "E501",   # pre-existing long lines, not in scope here
    "S311",   # random is used for game mechanics (dice, character gen), not security
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "S101",   # assert is normal pytest syntax
    "S105",   # hardcoded sentinel values are fine in test fixtures
    "S106",   # hardcoded passwords are fine in test fixtures
    "ANN",    # test fixtures and helpers — annotation completeness is low value here
]
"packages/initbot-core/src/initbot_core/state/local.py" = [
    "B006",   # MutableSequence default in pydantic model is safe; pydantic wraps mutable defaults
]
"packages/initbot-core/src/initbot_core/models/roll.py" = [
    "PERF203",  # try/except must be inside the loop to probe each dice class in sequence
]
"packages/initbot-core/src/initbot_core/state/sql.py" = [
    "RUF012",  # peewee Model field assignments are handled by the peewee metaclass, not ClassVar
]

[tool.vulture]
min_confidence = 80
paths = [
    "packages/initbot-core/src",
    "packages/initbot-chat/src",
    "packages/initbot-web/src",
]

[tool.coverage.report]
fail_under = 80

[tool.mutmut]
paths_to_mutate = [
    "packages/initbot-core/src/",
    "packages/initbot-chat/src/",
    "packages/initbot-web/src/",
]
tests_dir = ["tests/"]
pytest_add_cli_args = ["--tb=no", "-q"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [
    "packages/initbot-core/src",
    "packages/initbot-chat/src",
    "packages/initbot-web/src",
]
filterwarnings = [
    "error::DeprecationWarning",
    "error::PendingDeprecationWarning",
    "ignore::DeprecationWarning:discord",
]
