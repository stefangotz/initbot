[tool.uv.workspace]
members = [
    "packages/initbot-core",
    "packages/initbot-chat",
    "packages/initbot-web",
]

[dependency-groups]
dev = [
    "pre-commit>=3.5.0",
    "black>=24.8.0",
    "coverage>=7.6.1",
    "pip-audit>=2.7",
    "ruff>=0.9.0",
    "httpx>=0.27",
    "mypy>=1.11.2",
    "pylint>=3.2.7",
    "pytest>=8.3.3",
    "pytest-asyncio>=0.24",
    "types-peewee>=3.17.7.20241017",
    "zizmor>=1.23.1",
    "reuse>=6.2.0",
]

[tool.black]
target-version = ["py310", "py311", "py312", "py313", "py314"]

[tool.mypy]
check_untyped_defs = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "packages/initbot-core/src:packages/initbot-chat/src:packages/initbot-web/src"

[[tool.mypy.overrides]]
module = ["uvicorn", "uvicorn.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "error::DeprecationWarning",
    "error::PendingDeprecationWarning",
    "ignore::DeprecationWarning:discord",
]
