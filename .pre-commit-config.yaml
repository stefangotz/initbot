repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        args:
          - packages/initbot-core/src
          - packages/initbot-chat/src
          - packages/initbot-web/src
        pass_filenames: false
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0  # commit 01886c8a910c64595c47f186ca1ffc0b77fa5458
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0  # commit 57e1618d78fd469a92c1e584e8c9313024656623
    hooks:
      - id: hadolint
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
  - repo: local
    hooks:
      - id: check-python-versions
        name: check-python-versions
        entry: uv run check-python-versions
        language: system
        args:
          - packages/initbot-core
          - packages/initbot-chat
          - packages/initbot-web
        pass_filenames: false
        always_run: true
      - id: vulture
        name: vulture
        entry: uv run vulture
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        args: [initbot_core, initbot_chat, initbot_web, tests]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
