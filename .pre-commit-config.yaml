repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0  # pragma: allowlist secret
    hooks:
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 4924b0e01e032fea073ad04a1c5cfa7e4add0afb  # v0.15.6  # pragma: allowlist secret
    hooks:
      - id: ruff
      - id: ruff-format
        types_or: [python, pyi, jupyter, markdown]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        args:
          - packages/initbot-core/src
          - packages/initbot-chat/src
          - packages/initbot-web/src
        pass_filenames: false
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # v1.5.0  # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # v0.11.0.1  # pragma: allowlist secret
    hooks:
      - id: shellcheck
        args: ["-x"]
  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623  # v2.14.0  # pragma: allowlist secret
    hooks:
      - id: hadolint
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: ea2eb407b4cbce87cf0d502f36578950494f5ac9  # v1.23.1  # pragma: allowlist secret
    hooks:
      - id: zizmor
  - repo: https://github.com/fsfe/reuse-tool
    rev: a1bb792acda6fd0724936b4ebbdbc8eceb9c0459  # v6.2.0  # pragma: allowlist secret
    hooks:
      - id: reuse
        # --no-multiprocessing: reuse uses ProcessPoolExecutor by default,
        # which requires semaphore creation. This fails in sandboxed
        # environments (e.g. nono) that block the sem_open syscall.
        args: [--no-multiprocessing, lint]
  - repo: local
    hooks:
      # Prevent tag-based pre-commit pins slipping in via manual edits or
      # automated updates. Local repo blocks never have a rev: field, so every
      # rev: line in this file belongs to an external repo and must be a
      # 40-char hex commit SHA.
      #
      # First grep extracts all rev: lines; second grep -v filters out those
      # that contain a 40-hex-char SHA. If anything survives, a tag-based pin
      # was found and ! flips the exit code to signal failure.
      - id: check-precommit-pins
        name: check pre-commit SHA pins
        entry: sh -c 'if grep -E "^\s+rev:" .pre-commit-config.yaml | grep -qvE "[0-9a-f]{40}"; then echo "pre-commit pins must use 40-char commit SHAs, not tags -- fix with pre-commit autoupdate --freeze"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
      - id: check-python-versions
        name: check-python-versions
        entry: uv run check-python-versions
        language: system
        args:
          - packages/initbot-core
          - packages/initbot-chat
          - packages/initbot-web
        pass_filenames: false
        always_run: true
      - id: vulture
        name: vulture
        entry: uv run vulture
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        args: [initbot_core, initbot_chat, initbot_web, tests]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
