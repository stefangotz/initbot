name: CI/CD

on:
  push:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          version: "0.10.10"
          checksum: "3e1027f26ce8c7e4c32e2277a7fed2cb410f2f1f9320d3df97653d40e21f415b"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}
      - name: black
        run: |
          .venv/bin/black --check packages/initbot-core/src packages/initbot-chat/src packages/initbot-web/src tests
      - name: ruff
        run: |
          .venv/bin/ruff check packages/initbot-core/src packages/initbot-chat/src packages/initbot-web/src tests
      - name: zizmor
        run: |
          .venv/bin/zizmor .github/workflows/
      - name: Pylint
        run: |
          uv run pylint initbot_core initbot_chat initbot_web tests
      - name: ty
        run: |
          .venv/bin/ty check packages/initbot-core/src packages/initbot-chat/src packages/initbot-web/src
      - name: vulture
        run: |
          .venv/bin/vulture
      - name: reuse
        run: uv run reuse lint
      - name: pip-audit
        run: uv run pip-audit
      - name: detect-secrets
        run: git ls-files -z | xargs -0 .venv/bin/detect-secrets-hook --baseline .secrets.baseline
      - name: test
        run: |
          api_key=x .venv/bin/coverage run -m --source=packages/initbot-core/src,packages/initbot-chat/src,packages/initbot-web/src pytest tests
          .venv/bin/coverage report

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          version: "0.10.10"
          checksum: "3e1027f26ce8c7e4c32e2277a7fed2cb410f2f1f9320d3df97653d40e21f415b"
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --python 3.14
      - name: Generate SBOM
        run: uv run cyclonedx-py environment --of JSON -o bom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: bom.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-linux-x86_64
          echo "6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47  /usr/local/bin/hadolint" | sha256sum -c
          chmod +x /usr/local/bin/hadolint
      - name: hadolint
        run: hadolint Dockerfile
      - name: Build Docker images
        run: |
          docker build --target chat -t initbot-chat .
          docker build --target web  -t initbot-web  .
      - name: "Trivy: scan initbot-chat"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: initbot-chat
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: "Trivy: scan initbot-web"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: initbot-web
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: "Verify chat: invalid token raises LoginFailure"
        run: |
          output=$(docker run --rm initbot-chat --token 123 2>&1) || true
          echo "$output"
          echo "$output" | grep -qF "discord.errors.LoginFailure"
      - name: "Verify web: missing SQLite state raises SystemExit"
        run: |
          output=$(docker run --rm initbot-web 2>&1) || true
          echo "$output"
          echo "$output" | grep -qF "initbot-web requires a SQLite state URI"
