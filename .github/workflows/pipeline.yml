name: CI/CD

on:
  push:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@445689ea25e0de0a23313031f5fe577c74ae45a1 # v6.3.0
        with:
          version: "0.10.10"
          checksum: "3e1027f26ce8c7e4c32e2277a7fed2cb410f2f1f9320d3df97653d40e21f415b"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}
      - name: black
        run: |
          .venv/bin/black --check initbot tests
      - name: Pylint
        run: |
          .venv/bin/pylint initbot tests
      - name: mypy
        run: |
          .venv/bin/mypy -p initbot
      - name: test
        run: |
          api_key=x .venv/bin/coverage run -m --source=initbot pytest tests
          .venv/bin/coverage report
