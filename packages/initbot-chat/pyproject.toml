[project]
name = "initbot-chat"
version = "0.1.0"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
dependencies = [
    "discord-py~=2.3",
    "initbot-core",
]

[project.scripts]
initbot = "initbot.bot.bot:run"

[tool.uv.sources]
initbot-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/initbot"]
