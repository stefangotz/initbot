[project]
name = "initbot-chat"
version = "0.1.0"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
dependencies = [
    "discord-py~=2.3",
    "initbot-core",
]

[project.scripts]
initbot = "initbot_chat.bot:run"

[tool.uv.sources]
initbot-core = { workspace = true }

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"
