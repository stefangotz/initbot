[project]
name = "initbot-core"
version = "0.1.0"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
dependencies = [
    "peewee~=4.0",
    "pydantic-settings~=2.0",
    "pydantic~=2.0",
    "python-dotenv~=1.2",
    "typing-extensions>=4.12.2 ; python_full_version < '3.11'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/initbot"]
