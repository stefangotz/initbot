<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Initiative Tracker</title>
  <script type="module"
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js">
  </script>
</head>
<body>
  <div id="security-alert">{% if has_vulnerabilities %}<p>This application needs to receive a security update.</p>{% endif %}</div>
  <h1>Initiative Order</h1>
  <div data-init="@get('/s/{{ secret }}/sse')">
    <table>
      <thead>
        <tr><th>#</th><th>Init</th><th>Character</th><th>Player</th></tr>
      </thead>
      <tbody id="initiative-rows">
        <tr><td colspan="4">Waiting for data…</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
