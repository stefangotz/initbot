<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initiative Tracker</title>
  <script type="module"
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js">
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='6' width='20' height='4' fill='%23b8860b'/><rect x='13' y='10' width='6' height='12' fill='%23b8860b'/><rect x='6' y='22' width='20' height='4' fill='%23b8860b'/></svg>">
  {% include '_pwa_head.html' %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ────────────────────────────────────────── */
    :root {
      --color-bg:      #f5f0e8;   /* creamy marble white           */
      --color-offset:  #8f8b87;   /* light warm grey               */
      --color-ink:     #1a1209;   /* warm near-black               */
      --color-gold:    #b8860b;   /* antique gold, ~4:1 on bg      */
      --color-row-alt: #f0ede8;   /* barely-there warm grey        */
      --font-main:     'Cinzel', Georgia, serif;
      --tap-target:    2.75rem;   /* WCAG ≥44px finger-friendly hit area */
    }

    /* ── Reset / base ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-ink);
      font-family: var(--font-main);
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Player identity bar ─────────────────────────────────── */
    #player-bar {
      text-align: right;
      font-size: 0.8rem;
      color: rgba(26, 18, 9, 0.55);
      padding: 0.4rem 1.5rem 0;
      letter-spacing: 0.04em;
    }

    /* ── Security alert (full-width banner) ───────────────────── */
    #security-alert:not(:empty) {
      width: 100%;
      background: var(--color-offset);
      color: var(--color-bg);
      border-left: 6px solid var(--color-gold);
      font-size: 0.875rem;
      font-weight: 700;
    }

    #security-alert p {
      padding: 0.75rem 1.5rem;
      letter-spacing: 0.05em;
    }

    #security-alert p::before {
      content: '\26A0\00A0\00A0';
    }

    /* ── Page wrapper ─────────────────────────────────────────── */
    body > div[data-init] {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      /* Establish a containment context so the table can respond to the
         wrapper's actual inline-size rather than the viewport. */
      container-type: inline-size;
    }

    /* ── Heading ──────────────────────────────────────────────── */
    h1 {
      font-family: var(--font-main);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-ink);
      text-align: center;
      width: fit-content;
      margin: 1.5rem auto;
      border-bottom: 2px solid var(--color-gold);
      padding-bottom: 0.4rem;
    }

    /* ── Table layout — rules & invariants ────────────────────────
       Bounds:
         Wrapper max-width 680px → table content area caps at 632px.

       Column widths (table-layout: fixed below):
         Init 3.5em · Dice 5em · Roll 3em · Delete 3em — explicit on thead th.
         Character (col 2) and Player (col 3) are auto: they share whatever
         is left, equally. Either name truncates with an ellipsis when its
         share is too narrow for the content.

       Progressive disclosure (@container queries on wrapper width, em-based,
       so breakpoints scale with the user's font-size and zoom):
         ≥ 32em      → all six columns
         28–31.99em  → hide Player
         22–27.99em  → also hide Dice
         <  22em     → also hide Delete
         Init, Character, and Roll are always visible.
         Drop order: Player → Dice → Delete.

       Touch vs viewport — separate concerns:
         @media (hover: none): touch sizing (≥44px tap targets, ≥16px input
           font, cancel button shown). Applies on touch at any viewport.
         @media (max-width: 480px): narrow-viewport padding tuning only.
           Body font stays 16px so the @container em breakpoints don't shift
           discontinuously across this boundary.

       Invariants:
         1. No horizontal page scroll at any viewport.
         2. Roll & Delete buttons (when shown) are always fully visible.
         3. Character and Player are always equal width when both are visible.
         4. Column drop thresholds scale with the user's font-size and zoom. */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead tr {
      background-color: var(--color-offset);
      color: var(--color-bg);
    }

    thead th {
      padding: 0.6rem 1rem;
      text-align: left;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(74, 71, 66, 0.25);
    }

    tbody tr:nth-child(even) {
      background-color: var(--color-row-alt);
    }

    tbody td {
      padding: 0.6rem 1rem;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* ── Column styles ──────────────────────────────────────────── */
    /* Init value — gold, bold */
    #char-rows td:first-child {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--color-gold);
    }

    /* Explicit widths on the narrow columns. With table-layout:fixed above,
       these determine the final column widths. Char (col 2) and Player
       (col 3) are intentionally left auto so they share the remaining
       horizontal space equally. */
    thead th:nth-child(1) { width: 3.5em; }   /* Init */
    thead th:nth-child(4) { width: 5em; }     /* Dice */
    thead th:nth-child(5) { width: 3em; }     /* Roll */
    thead th:nth-child(6) { width: 3em; }     /* Delete */

    /* Character & Player name columns share the remainder equally and
       truncate with an ellipsis when a name is too long to fit. */
    #char-rows td:nth-child(2),
    #char-rows td:nth-child(3) {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #char-rows td:nth-child(2) {
      font-weight: 700;
    }

    /* Player name — muted */
    #char-rows td:nth-child(3) {
      color: rgba(26, 18, 9, 0.65);
      font-size: 0.9rem;
    }

    /* Dice expression — muted */
    #char-rows td:nth-child(4) {
      color: rgba(26, 18, 9, 0.65);
      font-size: 0.9rem;
    }

    /* Action cells (roll, delete) — centred, tight horizontal padding.
       Column width is set by thead th above (table-layout: fixed). */
    #char-rows td:nth-child(5),
    #char-rows td:nth-child(6),
    #create-row td:nth-child(6) {
      text-align: center;
      padding: 0.6rem 0.25rem;
    }

    /* Placeholder row */
    tbody tr td[colspan] {
      text-align: center;
      padding: 1.5rem;
      color: var(--color-gold);
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    /* ── Sort indicator ───────────────────────────────────────── */
    #sort-indicator {
      margin-top: 1rem;
    }

    .resort-btn {
      display: block;
      width: 100%;
      background: var(--color-gold);
      color: var(--color-bg);
      border: none;
      padding: 0.75rem 1rem;
      font-family: var(--font-main);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      animation: pulse-gold 2s ease-in-out infinite;
    }

    .resort-btn:hover {
      opacity: 0.85;
      animation: none;
    }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(184, 134, 11, 0.55); }
      50%       { box-shadow: 0 0 0 8px rgba(184, 134, 11, 0); }
    }

    /* ── Inline editing ───────────────────────────────────────── */
    .editable {
      display: block;
      cursor: pointer;
      border-radius: 2px;
    }

    .editable:hover {
      background: rgba(184, 134, 11, 0.12);
    }

    .editable-empty {
      color: rgba(26, 18, 9, 0.3);
      font-style: italic;
    }

    .inline-input {
      font-family: var(--font-main);
      font-size: inherit;
      color: var(--color-gold);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--color-gold);
      padding: 0.1rem 0.2rem;
      outline: none;
      width: 100%;
      min-width: 4rem;
    }

    .inline-select {
      font-family: var(--font-main);
      font-size: 0.9rem;
      color: var(--color-gold);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--color-gold);
      outline: none;
      cursor: pointer;
    }

    .field-error {
      display: block;
      font-size: 0.78rem;
      color: #c0392b;
      margin-top: 0.15rem;
      font-family: var(--font-main);
    }

    /* ── Roll & delete buttons ────────────────────────────────────
       Same icon-button shape; only the resting opacity differs to nudge
       attention toward roll (more frequent action) over delete. */
    .roll-btn,
    .del-btn {
      background: none;
      border: none;
      padding: 0 0.25rem;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
    }
    .del-btn  { opacity: 0.3; }
    .roll-btn { opacity: 0.45; }

    /* ── Add-character button ────────────────────────────────── */
    .add-btn {
      display: block;
      background: none;
      border: none;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.55;
      margin: 0.75rem 0 0 0;
      padding: 0.1rem 0.2rem;
    }

    /* ── Idle-action affordance (shared by .roll-btn, .del-btn, .add-btn) ──
       Each button is dimmed at rest (per-element opacity above). On hover-
       capable devices, :hover brightens the targeted button to show which
       row the pointer is on. On touch, :hover would stick to the last-
       tapped button and make its siblings look greyed by contrast, so we
       force full opacity there. */
    @media (hover: hover) {
      .roll-btn:hover,
      .del-btn:hover,
      .add-btn:hover {
        opacity: 1;
      }
    }

    /* ── Touch cancel button (hidden on pointer devices) ─────── */
    .cancel-touch {
      display: none;
      background: none;
      border: 1px solid var(--color-offset);
      font-size: 0.85rem;
      padding: 0.15rem 0.4rem;
      cursor: pointer;
      color: var(--color-ink);
      font-family: var(--font-main);
    }

    /* ── Touch sizing ──────────────────────────────────────────────
       Every adjustment in this block adapts the UI for finger input.
       It is intentionally keyed on `hover: none` (actual touch capability),
       not on viewport width — a tablet in landscape still needs tap-sized
       controls, and a desktop user shrinking their window does not. */
    @media (hover: none) {
      /* See "Idle-action affordance" above for why these stay opaque on touch. */
      .roll-btn,
      .del-btn,
      .add-btn {
        opacity: 1;
      }

      /* Every interactive control gets the same minimum tap height. */
      .cancel-touch,
      .roll-btn,
      .del-btn,
      .add-btn,
      .editable,
      .inline-input,
      .inline-select,
      #create-init-input,
      #create-name-input {
        min-height: var(--tap-target);
      }

      /* Cancel button is hidden on pointer devices (Escape/click-outside dismiss the create row there). */
      .cancel-touch {
        display: inline;
        padding: 0.5rem 0.75rem;
        font-size: 0.9rem;
      }

      .roll-btn,
      .del-btn {
        font-size: 1.1rem;
        padding: 0.5rem;
        min-width: var(--tap-target);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .add-btn {
        font-size: 1.5rem;
        padding: 0.4rem 0.5rem;
        display: inline-flex;
        align-items: center;
      }

      /* Editable spans become the whole-row tap target — not just the text glyphs. */
      .editable {
        display: flex;
        align-items: center;
      }

      /* font-size: 1rem (≥16px) prevents iOS Safari from auto-zooming on focus. */
      .inline-input,
      .inline-select,
      #create-init-input,
      #create-name-input {
        font-size: 1rem;
        padding: 0.4rem 0.5rem;
      }

      .inline-select {
        padding: 0.4rem 0.25rem;
      }
    }

    /* ── Progressive column disclosure ─────────────────────────
       Hide columns one at a time as the wrapper narrows. Drop order
       (least essential first): Player → Dice → Delete. Breakpoints
       are in em so they scale with the user's font-size and zoom. */
    @container (max-width: 32em) {
      thead th:nth-child(3),
      tbody td:nth-child(3) {
        display: none;
      }
    }

    @container (max-width: 28em) {
      thead th:nth-child(4),
      tbody td:nth-child(4) {
        display: none;
      }
    }

    @container (max-width: 22em) {
      thead th:nth-child(6),
      tbody td:nth-child(6) {
        display: none;
      }
    }

    /* ── Group separator row ──────────────────────────────────── */
    tr.group-separator td {
      border-top: 3px solid var(--color-offset);
    }

    /* ── Idle rows ────────────────────────────────────────────── */
    tr.idle {
      opacity: 0.5;
    }

    tbody tr.idle:nth-child(even) {
      background-color: var(--color-bg);
    }

    /* ── Narrow-viewport tuning ────────────────────────────────────
       Pure layout tweaks for narrow viewports (independent of touch).
       Body font stays at 16px throughout so the @container `em` units
       have a constant scale — otherwise crossing this breakpoint would
       discontinuously shift the column-disclosure thresholds. */
    @media (max-width: 480px) {
      body > div[data-init] {
        padding: 0 1rem 2rem;
      }

      thead th,
      tbody td {
        padding: 0.4rem 0.6rem;
      }
    }
  </style>
</head>
<body>
  {% if player_name %}<div id="player-bar">{{ player_name }}</div>{% endif %}
  <div id="security-alert">{% if has_high_severity_vulnerabilities %}<p>This application needs to receive a security update.</p>{% endif %}</div>
  <h1>Initiative Order</h1>
  <div data-init="@get('{{ sse_url }}')"
       data-signals='{"editchar": "", "editingfield": "", "nextchar": "", "nextfield": "", "initval": "", "editerror": "", "creating": false, "newcharname": "", "nameerror": "", "editplayerid": ""}'>
    <table>
      <thead>
        <tr><th>Init</th><th>Character</th><th>Player</th><th>Dice</th><th></th><th></th></tr>
      </thead>
      <tbody id="char-rows"></tbody>
      <tbody id="create-row" data-show="$creating" style="display:none">
        <tr>
          <td>
            <input id="create-init-input" class="inline-input" type="text" data-bind:initval
                   autocomplete="off" placeholder="e.g. 17 or d20+3"
                   title="Set when this character acts — enter a number (e.g. 17) or a dice roll (e.g. d20+3)"
                   data-on:keydown="evt.key==='Tab' ? (evt.preventDefault(),document.getElementById('create-name-input')?.focus()) : (evt.key==='Escape' ? ($creating=false,$initval='',$editerror='',$nameerror='') : (evt.key==='Enter' && @post('{{ add_character_url }}')))"
                   data-on:blur="setTimeout(() => { if(!document.querySelector('#create-row').contains(document.activeElement)){$creating=false;$initval='';$editerror='';$nameerror='';} }, 0)">
            <span class="field-error" data-show="$editerror" data-text="$editerror" style="display:none"></span>
          </td>
          <td>
            <input id="create-name-input" class="inline-input" type="text" data-bind:newcharname
                   maxlength="32" autocomplete="off" placeholder="Character name"
                   title="Enter the character's name"
                   data-effect="$creating && setTimeout(() => el.focus(), 0)"
                   data-on:keydown="evt.key==='Tab' ? (evt.preventDefault(),document.getElementById('create-init-input')?.focus()) : (evt.key==='Escape' ? ($creating=false,$newcharname='',$editerror='',$nameerror='') : (evt.key==='Enter' && @post('{{ add_character_url }}')))"
                   data-on:blur="setTimeout(() => { if(!document.querySelector('#create-row').contains(document.activeElement)){$creating=false;$newcharname='';$editerror='';$nameerror='';} }, 0)">
            <span class="field-error" data-show="$nameerror" data-text="$nameerror" style="display:none"></span>
          </td>
          <td></td>
          <td></td>
          <td>
            <button type="button" class="cancel-touch"
                    title="Cancel and return to the tracker"
                    data-on:click="$creating=false,$newcharname='',$initval='',$editerror='',$nameerror=''">&#x2717;</button>
          </td>
          <td></td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="add-btn"
            title="Add a new character to the initiative order"
            data-on:click="$creating=true,$editchar='',$editingfield='',$initval='',$newcharname='',$editplayerid='',$editerror='',$nameerror=''">
      &#x2795;
    </button>
    <div id="sort-indicator"></div>
  </div>
</body>
</html>
