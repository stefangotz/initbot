<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initiative Tracker</title>
  <script type="module"
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js">
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='6' width='20' height='4' fill='%23b8860b'/><rect x='13' y='10' width='6' height='12' fill='%23b8860b'/><rect x='6' y='22' width='20' height='4' fill='%23b8860b'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Palette ──────────────────────────────────────────────── */
    :root {
      --color-bg:      #f5f0e8;   /* creamy marble white           */
      --color-offset:  #8f8b87;   /* light warm grey               */
      --color-ink:     #1a1209;   /* warm near-black               */
      --color-gold:    #b8860b;   /* antique gold, ~4:1 on bg      */
      --color-row-alt: #f0ede8;   /* barely-there warm grey        */
      --font-main:     'Cinzel', Georgia, serif;
    }

    /* ── Reset / base ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-ink);
      font-family: var(--font-main);
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Player identity bar ─────────────────────────────────── */
    #player-bar {
      text-align: right;
      font-size: 0.8rem;
      color: rgba(26, 18, 9, 0.55);
      padding: 0.4rem 1.5rem 0;
      letter-spacing: 0.04em;
    }

    /* ── Security alert (full-width banner) ───────────────────── */
    #security-alert:not(:empty) {
      width: 100%;
      background: var(--color-offset);
      color: var(--color-bg);
      border-left: 6px solid var(--color-gold);
      font-size: 0.875rem;
      font-weight: 700;
    }

    #security-alert p {
      padding: 0.75rem 1.5rem;
      letter-spacing: 0.05em;
    }

    #security-alert p::before {
      content: '\26A0\00A0\00A0';
    }

    /* ── Page wrapper ─────────────────────────────────────────── */
    body > div[data-init] {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    /* ── Heading ──────────────────────────────────────────────── */
    h1 {
      font-family: var(--font-main);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-ink);
      text-align: center;
      width: fit-content;
      margin: 1.5rem auto;
      border-bottom: 2px solid var(--color-gold);
      padding-bottom: 0.4rem;
    }

    /* ── Table ────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background-color: var(--color-offset);
      color: var(--color-bg);
    }

    thead th {
      padding: 0.6rem 1rem;
      text-align: left;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(74, 71, 66, 0.25);
    }

    tbody tr:nth-child(even) {
      background-color: var(--color-row-alt);
    }

    tbody td {
      padding: 0.6rem 1rem;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 0;
    }

    /* ── Character name column: absorb remaining width ─────────── */
    #initiative-table thead th:first-child,
    #initiative-rows td:first-child,
    .char-section table thead th:first-child,
    #char-rows td:first-child {
      width: 100%;
    }

    /* ── Initiative table column styles ────────────────────────── */
    /* Character name — bold */
    #initiative-rows td:first-child {
      font-weight: 700;
    }

    /* Player name — muted */
    #initiative-rows td:nth-child(2) {
      color: rgba(26, 18, 9, 0.65);
      font-size: 0.9rem;
    }

    /* Init value — gold, bold */
    #initiative-rows td:nth-child(3) {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--color-gold);
    }

    /* ── Character table column styles ─────────────────────────── */
    /* Character name — bold */
    #char-rows td:first-child {
      font-weight: 700;
    }

    /* Player name — muted */
    #char-rows td:nth-child(2) {
      color: rgba(26, 18, 9, 0.65);
      font-size: 0.9rem;
    }

    /* Init value — gold, bold */
    #char-rows td:nth-child(3) {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--color-gold);
    }

    /* Dice expression — muted */
    #char-rows td:nth-child(4) {
      color: rgba(26, 18, 9, 0.65);
      font-size: 0.9rem;
    }

    /* Action columns (edit, die, delete) — narrow, centred */
    #char-rows td:nth-child(5),
    #char-rows td:nth-child(6),
    #char-rows td:nth-child(7) {
      width: 2rem;
      text-align: center;
      padding: 0.6rem 0.25rem;
    }

    /* Top-ranked combatant: gold left-accent */
    tbody tr#r0 {
      border-left: 4px solid var(--color-gold);
    }

    /* Placeholder row */
    tbody tr td[colspan] {
      text-align: center;
      padding: 1.5rem;
      color: var(--color-gold);
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    /* ── Edit panel ───────────────────────────────────────────── */
    #edit-panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding: 0.6rem 1rem;
      border-left: 4px solid var(--color-gold);
      background: var(--color-row-alt);
    }

    #edit-label {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-gold);
      min-width: 6rem;
    }

    #edit-panel form {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #edit-input {
      width: 15rem;
      font-family: var(--font-main);
      font-size: 1rem;
      color: var(--color-gold);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--color-gold);
      padding: 0.15rem 0.25rem;
      text-align: center;
      outline: none;
    }

    /* ── Delete button ────────────────────────────────────────── */
    .del-btn {
      background: none;
      border: none;
      padding: 0 0.25rem;
      opacity: 0.3;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
    }

    .del-btn:hover {
      opacity: 1;
    }

    /* Last column (delete) — narrow, centred */
    tbody td:last-child,
    thead th:last-child {
      width: 2.5rem;
      text-align: center;
    }

    /* ── Edit button ──────────────────────────────────────────── */
    .edit-btn {
      background: none;
      border: none;
      padding: 0 0.25rem;
      color: var(--color-gold);
      opacity: 0.45;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
    }

    .edit-btn:hover {
      opacity: 1;
    }

    /* ── Roll button ──────────────────────────────────────────── */
    .roll-btn {
      background: none;
      border: none;
      padding: 0 0.25rem;
      opacity: 0.45;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
    }

    .roll-btn:hover {
      opacity: 1;
    }

    /* ── Touch cancel button (hidden on pointer devices) ─────── */
    .cancel-touch {
      display: none;
      background: none;
      border: 1px solid var(--color-offset);
      font-size: 0.85rem;
      padding: 0.15rem 0.4rem;
      cursor: pointer;
      color: var(--color-ink);
      font-family: var(--font-main);
    }

    @media (hover: none) {
      .cancel-touch {
        display: inline;
      }
    }

    /* ── Dramatis Personae section ───────────────────────────────────── */
    .char-section {
      margin-top: 2.5rem;
    }

    .char-section h2 {
      font-family: var(--font-main);
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-ink);
      text-align: center;
      width: fit-content;
      margin: 0 auto 1rem;
      border-bottom: 2px solid var(--color-gold);
      padding-bottom: 0.3rem;
    }

    /* ── Group separator row ──────────────────────────────────── */
    tr.group-separator td {
      border-top: 2px solid rgba(74, 71, 66, 0.4);
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      body {
        font-size: 0.875rem;
      }

      thead th,
      tbody td {
        padding: 0.4rem 0.6rem;
      }
    }
  </style>
</head>
<body>
  {% if player_name %}<div id="player-bar">{{ player_name }}</div>{% endif %}
  <div id="security-alert">{% if has_high_severity_vulnerabilities %}<p>This application needs to receive a security update.</p>{% endif %}</div>
  <h1>Initiative Order</h1>
  <div data-init="@get('{{ sse_url }}')"
       data-signals='{"editing": false, "editchar": "", "initval": "", "editerror": ""}'>
    <div data-on:click="evt.target.closest('.edit-btn') && ($editing=true, $editchar=evt.target.closest('.edit-btn').dataset.char, $initval='')">
      <table id="initiative-table">
        <thead>
          <tr><th>Character</th><th>Player</th><th>Init</th></tr>
        </thead>
        <tbody id="initiative-rows">
          <tr><td colspan="3">Alea nondum iacta est…</td></tr>
        </tbody>
      </table>
      <section class="char-section">
        <h2>Dramatis Personae</h2>
        <div id="edit-panel" data-show="$editing" style="display: none">
          <span id="edit-label" data-text="$editchar"></span>
          <form data-on:submit__prevent="@post('{{ set_initiative_url }}')"
                data-effect="$editing && setTimeout(() => document.getElementById('edit-input')?.focus(), 0)">
            <input id="edit-input" type="text" data-bind:initval
                   autocomplete="off" placeholder="e.g. 17 or d20+3"
                   data-on:keydown="evt.key==='Escape' && ($editing=false)"
                   data-on:input="$editerror=''">
            <button type="button" class="cancel-touch"
                    data-on:click="$editing=false">&#x2717;</button>
            <p id="edit-error" data-show="$editerror" data-text="$editerror" style="display:none"></p>
          </form>
        </div>
        <table>
          <thead>
            <tr><th>Character</th><th>Player</th><th>Init</th><th>Dice</th><th></th><th></th><th></th></tr>
          </thead>
          <tbody id="char-rows"></tbody>
        </table>
      </section>
    </div>
  </div>
</body>
</html>
