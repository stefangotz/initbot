<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initiative Tracker — Join</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='6' width='20' height='4' fill='%23b8860b'/><rect x='13' y='10' width='6' height='12' fill='%23b8860b'/><rect x='6' y='22' width='20' height='4' fill='%23b8860b'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg:   #f5f0e8;
      --color-ink:  #1a1209;
      --color-gold: #b8860b;
      --color-err:  #8b1a1a;
      --font-main:  'Cinzel', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--color-bg);
      color: var(--color-ink);
      font-family: var(--font-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 2rem 3rem;
    }
    h1 {
      font-size: 1.4rem;
      color: var(--color-gold);
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--color-ink);
    }
    input[type="text"] {
      font-family: var(--font-main);
      font-size: 1rem;
      background: var(--color-bg);
      color: var(--color-ink);
      border: 1px solid var(--color-gold);
      padding: 0.4rem 0.8rem;
      border-radius: 3px;
      width: 100%;
      margin-bottom: 1rem;
      text-align: center;
    }
    input[type="text"]:focus {
      outline: 2px solid var(--color-gold);
      outline-offset: 1px;
    }
    button {
      font-family: var(--font-main);
      font-size: 1rem;
      background: var(--color-gold);
      color: var(--color-bg);
      border: none;
      padding: 0.6rem 1.6rem;
      cursor: pointer;
      border-radius: 3px;
    }
    button:hover { opacity: 0.85; }
    .error {
      color: var(--color-err);
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Initiative Tracker</h1>
    <form method="post">
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" autocomplete="off" autofocus maxlength="64">
      <div class="error">{{ error }}</div>
      <button type="submit">Join</button>
    </form>
  </div>
</body>
</html>
