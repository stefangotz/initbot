[project]
name = "initbot-web"
version = "0.1.0"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
dependencies = [
    "datastar-py>=0.8.0",
    "initbot-core",
    "jinja2>=3.1",
    "starlette>=0.40",
    "uvicorn[standard]>=0.30",
]

[project.scripts]
initbot-web = "initbot_web.app:run"

[tool.uv.sources]
initbot-core = { workspace = true }

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"
